<!-- Pie Chart -->

<div id="properties-pie" style="display:none;">
    <form onsubmit="return false;">
        <div class="container">

            <div class="box" id="grid-fields">
                <div class="columns">
                    <div class="column">
                        <div class="field">
                            <label class="label">Gadget title (optional)</label>
                            <div class="control">
                                <input class="input" name="card_title" type="text" placeholder="Can be empty, plain text or HTML" onchange="dlgPie.gehme.changed(this)">
                            </div>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title location</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="north" onchange="dlgPie.gehme.changed(this)" checked>
                                North
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="center" onchange="dlgPie.gehme.changed(this)">
                                Middle
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="south" onchange="dlgPie.gehme.changed(this)">
                                South
                            </label>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title alignment</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="left" onchange="dlgPie.gehme.changed(this)">
                                Left
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="center" onchange="dlgPie.gehme.changed(this)" checked>
                                Center
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="right" onchange="dlgPie.gehme.changed(this)">
                                Right
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="box">
                <div class="columns">
                    <div class="column">
                        <div class="field">
                            <label class="label">Labels color</label>
                            <div class="field has-addons mb-0">
                                <p class="control">
                                    <button class="button" type="button" name="lbl_clr_toggle" title="Toggle custom color" onclick="dlgPie._toggleClr_()">
                                        <span class="icon"><i class="ti ti-palette"></i></span>
                                    </button>
                                </p>
                                <p class="control is-expanded">
                                    <input class="input" name="lbl_clr" type="color" value="#000000" disabled onchange="dlgPie.gehme.changed(this)">
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="column">
                        <div class="field">
                            <label class="label">Legend</label>
                            <div class="field has-addons mb-0">
                                <p class="control">
                                    <button class="button" type="button" name="show_lgnd_toggle" title="Show / Hide legend" onclick="dlgPie._toggleLegend_()">
                                        <span class="icon"><i class="ti ti-check"></i></span>
                                    </button>
                                </p>
                                <p class="control is-expanded">
                                    <div class="select is-fullwidth">
                                        <select name="lgnd_pos" disabled onchange="dlgPie.gehme.changed(this)">
                                            <option value="top">Top</option>
                                            <option value="right" selected>Right</option>
                                            <option value="bottom">Bottom</option>
                                            <option value="left">Left</option>
                                        </select>
                                    </div>
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="column">
                        <div class="field">
                            <label class="label">Style</label>
                            <div class="control">
                                <label class="radio">
                                    <input type="radio" name="doughnut_style" value="pie" checked onchange="dlgPie.gehme.gadget.doughnut = false; dlgPie.gehme.fnOnChanged();">
                                    Pie
                                </label>
                                <label class="radio">
                                    <input type="radio" name="doughnut_style" value="doughnut"    onchange="dlgPie.gehme.gadget.doughnut = true;  dlgPie.gehme.fnOnChanged();">
                                    Doughnut
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="box">
                <p class="is-size-5 mb-3"><b>Pie slices (data from Devices)</b></p>
                <div class="columns">
                    <div class="column">
                        <table>
                            <tr>
                                <td><b>Slices:&nbsp;</b></td>
                                <td><div id="div-dlg-pie-toolbar-slices"></div></td>
                            </tr>
                        </table>
                        <table id="tbl-dlg-pie-slices" class="table is-bordered is-stripped is-fullwidth">
                            <thead>
                                <tr style="background-color:#444444;">
                                    <th style="color:#F9E79F;">Target ExEn</th>
                                    <th style="color:#F9E79F;">Device name</th>
                                    <th style="color:#F9E79F;">Key / Index</th>
                                    <th style="color:#F9E79F;">Slice label</th>
                                    <th style="color:#F9E79F;">Slice color</th>
                                </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
if( typeof dlgPie === "undefined" )
{
var dlgPie =
{
    gehme   : null,
    teSlice : null,

    setup : function( gadget, fnOnChanged, fnOnEditEnd )
    {
        this.gehme = new GadgetEditorHelperMultiExEn( 'properties-pie', gadget, fnOnChanged, fnOnEditEnd );

        if( this.teSlice === null )
            this._initTableEditor4Slices_();

        this.teSlice.setData( gadget.slices );

        if( gum.isUsingGridLayout() )  $('#grid-fields').show();
        else                           $('#grid-fields').hide();

        this._setClrEnabled_( ! p_base.isEmpty( gadget.lbl_clr ) );
        this._setLegendEnabled_( gadget.show_lgnd !== false );

        let sStyleVal = gadget.doughnut ? 'doughnut' : 'pie';
        $( '#properties-pie [name="doughnut_style"][value="' + sStyleVal + '"]' ).prop( 'checked', true );

        return this;
    },

    show()
    {
        this.gehme.showDialog();

        return this;
    },

    //-------------------------------------------------------------------------------------------------//

    /**
     * Toggles the Labels color field between enabled (custom color) and disabled (null).
     */
    _toggleClr_ : function()
    {
        let $input    = $( '#properties-pie [name="lbl_clr"]' );
        let isEnabled = ! $input.prop( 'disabled' );

        this._setClrEnabled_( ! isEnabled );

        this.gehme.gadget.lbl_clr = isEnabled ? null : $input.val();
        this.gehme.fnOnChanged();
    },

    /**
     * Sets the Labels color field enabled/disabled and updates its toggle button appearance.
     *
     * @param {boolean} bEnabled Whether the color input should be enabled.
     */
    _setClrEnabled_ : function( bEnabled )
    {
        let $input  = $( '#properties-pie [name="lbl_clr"]' );
        let $button = $( '#properties-pie [name="lbl_clr_toggle"]' );

        $input.prop( 'disabled', ! bEnabled );

        if( bEnabled )  $button.addClass(    'is-primary' );
        else            $button.removeClass( 'is-primary' );
    },

    /**
     * Toggles the Legend position select between enabled (legend visible) and disabled (hidden).
     */
    _toggleLegend_ : function()
    {
        let bNewEnabled = $( '#properties-pie [name="lgnd_pos"]' ).prop( 'disabled' );   // disabled → toggling to enabled

        this._setLegendEnabled_( bNewEnabled );
        this.gehme.gadget.show_lgnd = bNewEnabled;
        this.gehme.fnOnChanged();
    },

    /**
     * Sets the Legend position select enabled/disabled and updates its toggle button appearance.
     *
     * @param {boolean} bEnabled Whether the legend (and its position select) should be active.
     */
    _setLegendEnabled_ : function( bEnabled )
    {
        let $select = $( '#properties-pie [name="lgnd_pos"]' );
        let $button = $( '#properties-pie [name="show_lgnd_toggle"]' );

        $select.prop( 'disabled', ! bEnabled );

        if( bEnabled )  $button.addClass(    'is-primary' );
        else            $button.removeClass( 'is-primary' );
    },

    //-------------------------------------------------------------------------------------------------//

    _showSlicesInfo_()
    {
        let sHTML =
            '<div style="padding:10px;">' +
                '<p class="mb-3">Each row defines a <b>slice</b> in the pie chart. ' +
                    'A single device with a composite value (<code>list()</code> or <code>pair()</code>) can feed ' +
                    'multiple slices &mdash;one per key or index.</p>' +
                '<table class="table is-bordered is-fullwidth">' +
                    '<thead><tr style="background-color:#444444;">' +
                        '<th style="color:#F9E79F;">Column</th>' +
                        '<th style="color:#F9E79F;">Description</th>' +
                    '</tr></thead>' +
                    '<tbody>' +
                        '<tr>' +
                            '<td><b>Target ExEn</b></td>' +
                            '<td>The Execution Engine instance that owns the device.</td>' +
                        '</tr>' +
                        '<tr>' +
                            '<td><b>Device name</b></td>' +
                            '<td>The device to monitor. Its value changes update this slice.</td>' +
                        '</tr>' +
                        '<tr>' +
                            '<td><b>Key / Index</b></td>' +
                            '<td>Required when the device value is a <code>list()</code> or <code>pair()</code>. ' +
                                'For lists: a <b>1-based</b> numeric index (e.g. <code>1</code>, <code>2</code>). ' +
                                'For pairs: the key name (case-insensitive). ' +
                                'Leave empty for scalar devices.</td>' +
                        '</tr>' +
                        '<tr>' +
                            '<td><b>Slice label</b></td>' +
                            '<td>Display name shown in the pie legend and tooltip. ' +
                                'If empty, a label is auto-generated from the device name and accessor ' +
                                '(e.g. <code>weather[temperature]</code>).</td>' +
                        '</tr>' +
                        '<tr>' +
                            '<td><b>Slice color</b></td>' +
                            '<td>The color used to render this slice.</td>' +
                        '</tr>' +
                    '</tbody>' +
                '</table>' +
            '</div>';

        $('<div></div>').html( sHTML )
                        .dialog( { title   : 'Slices columns information',
                                   modal   : true,
                                   width   : 620,
                                   buttons : { "Close": function() { $(this).dialog("close"); } }
                                 } );
    },

    _initTableEditor4Slices_()
    {
        this.teSlice = new TableEditor( {
                                        table         : "tbl-dlg-pie-slices",
                                        toolbar       : "div-dlg-pie-toolbar-slices",
                                        onInfo        : function()
                                                        {
                                                            dlgPie._showSlicesInfo_();
                                                        },
                                        onCellPreEdit : function( table, nRowIndex, sColName, value )
                                                        {
                                                            if( (sColName === "exen") || (sColName === "name") )
                                                                dlgPie.gehme.setColEditor( table, sColName );

                                                            if( sColName === "accessor" )
                                                            {
                                                                let slices = dlgPie.gehme.gadget.slices;
                                                                let vt     = slices[nRowIndex] ? slices[nRowIndex]._valueType_ : null;

                                                                if( vt === "scalar" )
                                                                    return null;    // Cancel edit — confirmed scalar value
                                                            }

                                                            return value;
                                                        },
                                        onCellPostEdit: function( table, nRowIndex, sColName, value, isChanged )
                                                        {
                                                            if( value && isChanged )
                                                            {
                                                                let slices = dlgPie.gehme.gadget.slices;

                                                                switch( sColName )
                                                                {
                                                                    case "exen"    : slices[nRowIndex].exen     = value = value.trim().replace( /\\"/g, '"' );      break;
                                                                    case "name"    : slices[nRowIndex].name     = value.trim().toLowerCase();                       break;
                                                                    case "accessor": slices[nRowIndex].accessor = p_base.isEmpty( value ) ? null : value.trim();    break;
                                                                    case "label"   : slices[nRowIndex].label    = value.trim();                                     break;
                                                                    case "color"   : slices[nRowIndex].color    = (p_base.isEmpty( value ) ? "#00AA00" : value);    break;
                                                                }

                                                                dlgPie.gehme.fnOnChanged();
                                                            }

                                                            return value;
                                                        },
                                        onRowAppended : function( table, nRow )
                                                        {
                                                            let oExEn = gum.getAllExEn()[0];
                                                            let oRow  = { exen: JSON.stringify( oExEn ).replace( /\\"/g, '"' ), name: "", accessor: null, label: "", color: '#00AA00' };

                                                            table.setValue( nRow, "exen"    , oRow.exen  );
                                                            table.setValue( nRow, "name"    , oRow.name  );
                                                            table.setValue( nRow, "accessor", ""          );
                                                            table.setValue( nRow, "label"   , oRow.label );
                                                            table.setValue( nRow, "color"   , oRow.color );

                                                            dlgPie.gehme.gadget.slices.push( oRow );
                                                            dlgPie.gehme.fnOnChanged();
                                                        },
                                        onDeleteRow   : function( table, nRow )
                                                        {
                                                            dlgPie.gehme.gadget.slices.splice( nRow, 1 );
                                                            dlgPie.gehme.fnOnChanged();
                                                        },
                                        onRowCloned   : function( table, nRow )
                                                        {
                                                            dlgPie.gehme.gadget.slices.push( table.getRowData( nRow ) );
                                                            dlgPie.gehme.fnOnChanged();
                                                        },
                                        onRowMoved    : function( table, nFrom, nTo )
                                                        {
                                                            let arr = dlgPie.gehme.gadget.slices;
                                                            arr.splice( nTo, 0, arr.splice( nFrom, 1 )[0] );
                                                            dlgPie.gehme.fnOnChanged();
                                                        },
                                        columns       : [
                                                          { name: "exen"    , minwidth: 12, maxwidth: 32, editor: '<select></select>'    },
                                                          { name: "name"    , minwidth:  8, maxwidth: 16, editor: '<select></select>'    },
                                                          { name: "accessor", minwidth:  5, maxwidth:  8, editor: '<input type="text" placeholder="">' },
                                                          { name: "label"   , minwidth:  8, maxwidth: 16, editor: '<input type="text">'  },
                                                          { name: "color"   , minwidth:  6, maxwidth:  8, editor: '<input type="color">' }
                                                        ]
                                    } );
    }
};
}
</script>
