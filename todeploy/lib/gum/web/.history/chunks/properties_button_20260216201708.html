<div id="properties-button" style="display:none;">
    <form onsubmit="return false;">
        <div class="container">
            <div class="box" id="grid-fields">
                This gadget allows to create one push button or a toolbar with mutually exclusive buttons.<br>
                <br>
                <div class="columns">
                    <div class="column">
                        <div class="field">
                            <label class="label">Gadget title (optional)</label>
                            <div class="control">
                                <input class="input" name="card_title" type="text" placeholder="Can be empty, plain text or HTML" onchange="dlgButton.gehme.changed(this)">
                            </div>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title location</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="north" onchange="dlgButton.gehme.changed(this)" checked>
                                North
                              </label>
                              <label class="radio">
                                <input type="radio" name="card_title_location" value="center" onchange="dlgButton.gehme.changed(this)">
                                Center
                              </label>
                              <label class="radio">
                                <input type="radio" name="card_title_location" value="south" onchange="dlgButton.gehme.changed(this)">
                                South
                              </label>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title alignment</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="left" onchange="dlgButton.gehme.changed(this)">
                                Left
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="center" onchange="dlgButton.gehme.changed(this)" checked>
                                Middle
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="right" onchange="dlgButton.gehme.changed(this)">
                                Right
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Master: Buttons table -->
            <div class="box">
                <table>
                    <tr>
                        <td><b>Buttons:&nbsp;</b></td>
                        <td><div id="tbl-dlg-buttons-toolbar"></div></td>
                    </tr>
                </table>

                <table id="tbl-dlg-buttons" class="table is-bordered is-stripped is-fullwidth">
                    <thead>
                        <tr style="background-color:#444444;">
                            <th style="color:#F9E79F;">Text</th>
                            <th style="color:#F9E79F;">Icon (Tabler)</th>
                            <th style="color:#F9E79F;">Color</th>
                            <th style="color:#F9E79F;">Enabled</th>
                        </tr>
                    </thead>
                </table>

                <!-- Size -->
                <div class="field mb-0 is-flex is-align-items-center">
                    <label class="label is-small mr-3 mb-0">Size</label>
                    <div class="control">
                        <label class="radio is-small"><input type="radio" name="size" checked> Small</label>
                        <label class="radio is-small"><input type="radio" name="size"> Normal</label>
                        <label class="radio is-small"><input type="radio" name="size"> Medium</label>
                        <label class="radio is-small"><input type="radio" name="size"> Large</label>
                    </div>
                </div>
            </div>

            <!-- Detail: Actions table for selected button -->
            <div class="box">
                <table>
                    <tr>
                        <td><b>Actions for selected button:&nbsp;</b></td>
                        <td><div id="tbl-dlg-button-actions-toolbar"></div></td>
                    </tr>
                </table>
                <table id="tbl-dlg-button-actions" class="table is-bordered is-stripped is-fullwidth">
                    <thead>
                        <tr style="background-color:#444444;">
                            <th style="color:#F9E79F;">Action</th>
                            <th style="color:#F9E79F;">Target ExEn</th>
                            <th style="color:#F9E79F;">Name</th>
                            <th style="color:#F9E79F;">Value to send</th>
                            <th style="color:#F9E79F;">Send value as</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </form>
</div>

<script>
if( typeof dlgButton === "undefined" )
{
var dlgButton =
{
    gehme      : null,
    tblButtons : null,
    tblActions : null,
    _selBtnIdx : -1,       // Currently selected button row index in the master table

    /**
     * Initializes the dialog for the given gadget.
     *
     * @param {GumButton} gadget       The button gadget being edited.
     * @param {Function}  fnOnChanged  Callback when the gadget visually changes.
     * @param {Function}  fnOnEditEnd  Callback when editing ends.
     * @returns {dlgButton} this
     */
    setup : function( gadget, fnOnChanged, fnOnEditEnd )
    {
        this.gehme = new GadgetEditorHelperMultiExEn( 'properties-button', gadget, fnOnChanged, fnOnEditEnd );

        if( this.tblButtons === null )
            this.tblButtons = this._newButtonsTableEditor_();

        if( this.tblActions === null )
            this.tblActions = this._newActionsTableEditor_();

        // Load master table from gadget.buttons[]
        let masterRows = gadget.buttons.map( function( b )
        {
            return { text: b.text || "", icon: b.icon || "", color: b.color || "is-info", enabled: b.enabled !== false };
        });

        this._selBtnIdx = -1;
        this.tblButtons.setData( masterRows );
        this.tblActions.clear();

        // Select first button row if any
        if( masterRows.length > 0 )
            this._loadActionsForButton_( 0 );

        return this;
    },

    show()
    {
        this.gehme.showDialog();

        return this;
    },

    //--------------------------------------------------------------------------//

    /**
     * Persists the current detail (actions) table data back into the selected
     * button's `devices` array.
     */
    _saveCurrentActions_ : function()
    {
        if( this._selBtnIdx >= 0 && this._selBtnIdx < this.gehme.gadget.buttons.length )
        {
            let aoData = this.tblActions.getData( false );

            // Clean display-only "—" values before persisting
            for( let row of aoData )
            {
                if( ! row.action )  row.action = "change";
                if( row.action === "execute_rule" || row.action === "execute_script" )
                {
                    row.value = "";
                    row.type  = "";
                }
            }

            this.gehme.gadget.buttons[ this._selBtnIdx ].devices = aoData;
        }
    },

    /**
     * Loads the actions (devices) of the button at the given index into the
     * detail table.
     *
     * @param {number} idx Index in gadget.buttons[].
     */
    _loadActionsForButton_ : function( idx )
    {
        this._selBtnIdx = idx;

        let devs = this.gehme.gadget.buttons[idx].devices || [];

        // Prepare display data: show "—" for value/type on execute actions
        let displayDevs = devs.map( function( d )
        {
            let row = Object.assign( {}, d );
            if( ! row.action )  row.action = "change";    // Backward compat
            if( row.action === "execute_rule" || row.action === "execute_script" )
            {
                row.value = "\u2014";
                row.type  = "\u2014";
            }
            return row;
        });

        this.tblActions.setData( displayDevs );

        // Apply disabled styling to value/type cells for execute actions
        for( let n = 0; n < displayDevs.length; n++ )
            this._styleDisabledCells_( this.tblActions, n, displayDevs[n].action );
    },

    /**
     * Applies or removes disabled styling on the value/type cells of a row
     * depending on its action type.
     *
     * @param {TableEditor} table    The actions table editor.
     * @param {number}      nRow     Row index.
     * @param {String}      sAction  The action value for this row.
     */
    _styleDisabledCells_ : function( table, nRow, sAction )
    {
        let bDisabled = (sAction === "execute_rule" || sAction === "execute_script");

        ["value", "type"].forEach( function( sCol )
        {
            let cell = table.getCell( nRow, sCol );
            if( cell )
            {
                cell.style.backgroundColor = bDisabled ? "#f0f0f0" : "";
                cell.style.color           = bDisabled ? "#aaa"    : "";
                cell.style.cursor          = bDisabled ? "default" : "";
            }
        });
    },

    //--------------------------------------------------------------------------//
    // TABLE EDITOR FACTORIES

    /**
     * Creates the master TableEditor for the buttons list.
     *
     * @returns {TableEditor} The master table editor instance.
     */
    _newButtonsTableEditor_ : function()
    {
        let sColorOpts = '<option value="is-primary">Primary</option>'+
                         '<option value="is-info"   >Info</option>'+
                         '<option value="is-success">Success</option>'+
                         '<option value="is-warning">Warning</option>'+
                         '<option value="is-danger" >Danger</option>'+
                         '<option value="is-light"  >Light</option>'+
                         '<option value="is-dark"   >Dark</option>'+
                         '<option value="is-black"  >Black</option>';

        let sEnabledOpts = '<option value="true" >Yes</option>'+
                           '<option value="false">No</option>';

        return new TableEditor(
        {
            table         : "tbl-dlg-buttons",
            toolbar       : "tbl-dlg-buttons-toolbar",
            cellFormatter : function( table, sColName, value )
                            {
                                if( sColName === "color" )
                                {
                                    // Show a colored tag with the label
                                    let sLabel = (value || "is-info").replace( "is-", "" );
                                    return '<span class="tag '+ value +'">'+ sLabel +'</span>';
                                }

                                if( sColName === "icon" && p_base.isNotEmpty( value ) )
                                    return '<i class="ti ti-'+ value +'"></i> '+ value;

                                if( sColName === "enabled" )
                                    return (value === true || value === "true") ? "Yes" : "No";

                                return value;
                            },
            onRowSelected : function( table, nOldIdx, nNewIdx )
                            {
                                // Save actions from previous selection
                                dlgButton._saveCurrentActions_();

                                // Load actions for newly selected button
                                if( nNewIdx >= 0 )
                                    dlgButton._loadActionsForButton_( nNewIdx );
                            },
            onCellPostEdit: function( table, nRowIndex, sColName, value, isChanged )
                            {
                                if( value !== null && value !== undefined && isChanged )
                                {
                                    let btn = dlgButton.gehme.gadget.buttons[nRowIndex];

                                    switch( sColName )
                                    {
                                        case "text"   : btn.text    = value;                                       break;
                                        case "icon"   : btn.icon    = value.trim();                                break;
                                        case "color"  : btn.color   = value;                                       break;
                                        case "enabled": btn.enabled = (value === true || value === "true");         break;
                                    }

                                    dlgButton.gehme.fnOnChanged();
                                }

                                return value;
                            },
            onRowAppended : function( table, nRow )
                            {
                                let newBtn = { text: "Button", icon: "", color: "is-info", enabled: true, devices: [] };

                                table.setValue( nRow, "text"   , newBtn.text    );
                                table.setValue( nRow, "icon"   , newBtn.icon    );
                                table.setValue( nRow, "color"  , newBtn.color   );
                                table.setValue( nRow, "enabled", newBtn.enabled );

                                dlgButton.gehme.gadget.buttons.push( newBtn );
                                dlgButton.gehme.fnOnChanged();
                            },
            onDeleteRow   : function( table, nRow )
                            {
                                dlgButton.gehme.gadget.buttons.splice( nRow, 1 );

                                // Clear detail if we deleted the selected row
                                if( nRow === dlgButton._selBtnIdx )
                                {
                                    dlgButton._selBtnIdx = -1;
                                    dlgButton.tblActions.clear();
                                }
                                else if( nRow < dlgButton._selBtnIdx )
                                {
                                    dlgButton._selBtnIdx--;
                                }

                                dlgButton.gehme.fnOnChanged();
                            },
            onRowCloned   : function( table, nRow )
                            {
                                let src    = dlgButton.gehme.gadget.buttons[ table.getSelectedRowIndex() ];
                                let cloned = JSON.parse( JSON.stringify( src ) );

                                dlgButton.gehme.gadget.buttons.push( cloned );
                                dlgButton.gehme.fnOnChanged();
                            },
            columns       : [
                                { name: "text"   , minwidth:  8, maxwidth: 24, editor: '<input type="text">' },
                                { name: "icon"   , minwidth:  6, maxwidth: 16, editor: '<input type="text" placeholder="Tabler icon name">' },
                                { name: "color"  , minwidth:  8, maxwidth: 12, editor: '<select>'+ sColorOpts +'</select>' },
                                { name: "enabled", minwidth:  5, maxwidth:  6, editor: '<select>'+ sEnabledOpts +'</select>' }
                            ]
        });
    },

    /**
     * Creates the detail TableEditor for the actions of the currently selected button.
     *
     * @returns {TableEditor} The detail (actions) table editor instance.
     */
    _newActionsTableEditor_ : function()
    {
        let sTypeOpts = '<option value="boolean">boolean</option>'+
                        '<option value="number" >number</option>'+
                        '<option value="string" >string</option>';

        let sActionOpts = '<option value="change"        >Change Device</option>'+
                          '<option value="execute_rule"  >Execute Rule</option>'+
                          '<option value="execute_script">Execute Script</option>';

        return new TableEditor(
        {
            table         : "tbl-dlg-button-actions",
            toolbar       : "tbl-dlg-button-actions-toolbar",
            cellFormatter : function( table, sColName, value )
                            {
                                if( sColName === "action" )
                                {
                                    if( value === "execute_rule" )    return "Execute Rule";
                                    if( value === "execute_script" )  return "Execute Script";
                                    return "Change Device";
                                }

                                return value;
                            },
            onCellPreEdit : function( table, nRowIndex, sColName, value )
                            {
                                if( dlgButton._selBtnIdx < 0 )
                                    return null;    // No button selected — block editing

                                let sAction = table.getValue( nRowIndex, "action" );

                                // Block editing value/type when action is not "change"
                                if( (sColName === "value" || sColName === "type") &&
                                    (sAction === "execute_rule" || sAction === "execute_script") )
                                    return null;

                                if( sColName === "exen" )
                                    dlgButton.gehme.setColEditor( table, sColName );
                                else if( sColName === "name" )
                                    dlgButton.gehme.setColEditor( table, sColName, sAction );

                                return value;
                            },
            onCellPostEdit: function( table, nRowIndex, sColName, value, isChanged )
                            {
                                if( value !== null && value !== undefined && isChanged && dlgButton._selBtnIdx >= 0 )
                                {
                                    let devs = dlgButton.gehme.gadget.buttons[ dlgButton._selBtnIdx ].devices;

                                    switch( sColName )
                                    {
                                        case "action": devs[nRowIndex].action = value;
                                                       devs[nRowIndex].name   = "";
                                                       table.setValue( nRowIndex, "name", "" );
                                                       if( value === "execute_rule" || value === "execute_script" )
                                                       {
                                                           devs[nRowIndex].value = "";
                                                           devs[nRowIndex].type  = "";
                                                           table.setValue( nRowIndex, "value", "\u2014" );
                                                           table.setValue( nRowIndex, "type" , "\u2014" );
                                                       }
                                                       else
                                                       {
                                                           devs[nRowIndex].value = "";
                                                           devs[nRowIndex].type  = "string";
                                                           table.setValue( nRowIndex, "value", "" );
                                                           table.setValue( nRowIndex, "type" , "string" );
                                                       }
                                                       dlgButton._styleDisabledCells_( table, nRowIndex, value );
                                                       break;
                                        case "exen"  : devs[nRowIndex].exen   = value.trim().toLowerCase(); break;
                                        case "name"  : devs[nRowIndex].name   = value.trim().toLowerCase(); break;
                                        case "value" : devs[nRowIndex].value  = value;                      break;
                                        case "type"  : devs[nRowIndex].type   = value;                      break;
                                    }

                                    dlgButton.gehme.fnOnChanged();
                                }

                                return value;
                            },
            onRowAppended : function( table, nRow )
                            {
                                if( dlgButton._selBtnIdx < 0 )
                                    return;

                                let oExEn = gum.getAllExEn()[0];
                                let oRow  = { action: "change", exen: JSON.stringify( oExEn ), name: "", value: "", type: "string" };

                                table.setValue( nRow, "action", oRow.action );
                                table.setValue( nRow, "exen"  , oRow.exen   );
                                table.setValue( nRow, "name"  , oRow.name   );
                                table.setValue( nRow, "value" , oRow.value  );
                                table.setValue( nRow, "type"  , oRow.type   );

                                dlgButton.gehme.gadget.buttons[ dlgButton._selBtnIdx ].devices.push( oRow );
                                dlgButton.gehme.fnOnChanged();
                            },
            onDeleteRow   : function( table, nRow )
                            {
                                if( dlgButton._selBtnIdx >= 0 )
                                    dlgButton.gehme.gadget.buttons[ dlgButton._selBtnIdx ].devices.splice( nRow, 1 );

                                dlgButton.gehme.fnOnChanged();
                            },
            onRowCloned   : function( table, nRow )
                            {
                                if( dlgButton._selBtnIdx >= 0 )
                                {
                                    dlgButton.gehme.gadget.buttons[ dlgButton._selBtnIdx ].devices.push( table.getRowData( nRow ) );
                                    dlgButton.gehme.fnOnChanged();
                                }
                            },
            columns       : [
                                { name: "action", minwidth:  8, maxwidth: 14, editor: '<select>'+ sActionOpts +'</select>' },
                                { name: "exen",   minwidth: 12, maxwidth: 24, editor: '<select></select>' },
                                { name: "name",   minwidth:  8, maxwidth: 16, editor: '<select></select>' },
                                { name: "value",  minwidth:  8, maxwidth: 24, editor: '<input type="text">' },
                                { name: "type" ,  minwidth:  8, maxwidth:  8, editor: '<select>'+ sTypeOpts +'</select>' }
                            ]
        });
    }
};
}
</script>
