<!--
    HTML templates for all Gum gadgets.

    Each <template> element is cloned at runtime by the corresponding gadget class.
    Templates are inert (not rendered) until cloned via GumGadget.cloneTemplate().
    Dynamic content (IDs, options, event handlers) is set by the gadget JS after cloning.
-->

<!-- ======================================================================== -->
<!-- BUTTON                                                                   -->
<!-- ======================================================================== -->
<template id="tpl-button">
    <button class="button is-responsive"></button>
</template>

<!-- ======================================================================== -->
<!-- CHART (time-series line chart with canvas + data load panel)             -->
<!-- ======================================================================== -->
<template id="tpl-chart">
    <div>
        <div>
            <canvas></canvas>
        </div>
        <div class="columns">
            <div class="column is-half is-narrow" name="chart_data_load_panel" style="visibility:hidden">
                <label class="label is-small">Show historic</label>
                <div class="field is-horizontal">
                    <div class="field-body pl-5">
                        <label class="label is-small pr-3">From</label>
                        <div class="field">
                            <p class="control">
                                <input class="input is-small" type="datetime-local" name="from_date">
                            </p>
                        </div>
                    </div>
                    <div class="field-body pl-5">
                        <label class="label is-small pr-3">To</label>
                        <div class="field">
                            <p class="control">
                                <input class="input is-small" type="datetime-local" name="to_date">
                            </p>
                        </div>
                    </div>
                    <p class="pl-5 pr-5">
                        <button class="button is-small is-info" name="btnLoadOrLive">Load</button>
                    </p>
                </div>
            </div>
            <div class="column is-half is-narrow pr-5">
                <div class="field">
                    <div class="field-label is-small is-pulled-right">
                        <label class="label">Show only last... (0 for all)</label>
                    </div>
                    <br>
                    <div class="field-body is-pulled-right">
                        <div class="field has-addons has-addons-centered">
                            <p class="control">
                                <input class="input is-small" type="number" name="txtTimeFrame" value="0" min="0" style="width:9em;">
                            </p>
                            <p class="control">
                                <span class="select is-small">
                                    <select name="lstTimeFrameUnit">
                                        <option>mins</option>
                                        <option>hours</option>
                                        <option>days</option>
                                    </select>
                                </span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- ======================================================================== -->
<!-- CHECK (boolean icon toggle)                                              -->
<!-- ======================================================================== -->
<template id="tpl-check">
    <img>
</template>

<!-- ======================================================================== -->
<!-- GAUGE (arc gauge with canvas)                                            -->
<!-- ======================================================================== -->
<template id="tpl-gauge">
    <canvas></canvas>
</template>

<!-- ======================================================================== -->
<!-- PIE / DOUGHNUT (canvas-based chart)                                      -->
<!-- ======================================================================== -->
<template id="tpl-pie">
    <div style="width:100%; height:100%;">
        <canvas></canvas>
    </div>
</template>

<!-- ======================================================================== -->
<!-- SSD (Seven Segment Display - SVG based)                                  -->
<!-- ======================================================================== -->
<template id="tpl-ssd">
    <svg></svg>
</template>

<!-- ======================================================================== -->
<!-- TEXT (single-line label OR multi-line textarea)                           -->
<!-- ======================================================================== -->
<template id="tpl-text-label">
    <label class="label"></label>
</template>

<template id="tpl-text-textarea">
    <textarea class="textarea is-expanded"></textarea>
</template>

<!-- ======================================================================== -->
<!-- SCHEDULER (Kronos cron device — tab-based schedule configuration)        -->
<!-- ======================================================================== -->
<template id="tpl-scheduler">
    <!-- Navigation tabs -->
    <div class="tabs is-centered is-boxed is-small is-fullwidth mb-0">
        <ul>
            <li data-mode="daily"><a>Daily</a></li>
            <li data-mode="weekly"><a>Weekly</a></li>
            <li data-mode="monthly"><a>Monthly</a></li>
            <li data-mode="yearly"><a>Yearly</a></li>
        </ul>
    </div>

    <!-- Tab panels -->
    <div class="sched-panels" style="padding:8px;">

        <!-- Daily panel -->
        <div class="sched-panel sched-panel-daily">
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Time</label></div>
                <div class="field-body"><div class="control sched-time-daily-container"></div></div>
            </div>
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Every</label></div>
                <div class="field-body">
                    <div class="field is-grouped is-align-items-center">
                        <div class="control">
                            <input class="input is-small sched-every-daily" type="number" min="1" max="365" value="1" style="width:70px;">
                        </div>
                        <div class="control"><span class="is-size-7">day(s)</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Weekly panel -->
        <div class="sched-panel sched-panel-weekly">
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Time</label></div>
                <div class="field-body"><div class="control sched-time-weekly-container"></div></div>
            </div>
            <div class="field is-horizontal mt-2">
                <div class="field-label is-small"><label class="label">Days</label></div>
                <div class="field-body">
                    <div class="control">
                        <div class="buttons are-small sched-dow-container">
                            <button type="button" class="button is-small is-rounded sched-dow-btn" data-val="1">Mon</button>
                            <button type="button" class="button is-small is-rounded sched-dow-btn" data-val="2">Tue</button>
                            <button type="button" class="button is-small is-rounded sched-dow-btn" data-val="3">Wed</button>
                            <button type="button" class="button is-small is-rounded sched-dow-btn" data-val="4">Thu</button>
                            <button type="button" class="button is-small is-rounded sched-dow-btn" data-val="5">Fri</button>
                            <button type="button" class="button is-small is-rounded sched-dow-btn" data-val="6">Sat</button>
                            <button type="button" class="button is-small is-rounded sched-dow-btn" data-val="0">Sun</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Every</label></div>
                <div class="field-body">
                    <div class="field is-grouped is-align-items-center">
                        <div class="control">
                            <input class="input is-small sched-every-weekly" type="number" min="1" max="52" value="1" style="width:70px;">
                        </div>
                        <div class="control"><span class="is-size-7">week(s)</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Monthly panel -->
        <div class="sched-panel sched-panel-monthly">
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Time</label></div>
                <div class="field-body"><div class="control sched-time-monthly-container"></div></div>
            </div>
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Day</label></div>
                <div class="field-body">
                    <div class="field is-grouped is-align-items-center">
                        <div class="control">
                            <input class="input is-small sched-dom-monthly" type="number" min="1" max="31" value="1" style="width:70px;">
                        </div>
                        <div class="control"><span class="is-size-7">of month</span></div>
                    </div>
                </div>
            </div>
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Every</label></div>
                <div class="field-body">
                    <div class="field is-grouped is-align-items-center">
                        <div class="control">
                            <input class="input is-small sched-every-monthly" type="number" min="1" max="12" value="1" style="width:70px;">
                        </div>
                        <div class="control"><span class="is-size-7">month(s)</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Yearly panel -->
        <div class="sched-panel sched-panel-yearly">
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Time</label></div>
                <div class="field-body"><div class="control sched-time-yearly-container"></div></div>
            </div>
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Month</label></div>
                <div class="field-body">
                    <div class="control">
                        <div class="select is-small">
                            <select class="sched-month-yearly">
                                <option value="1">Jan</option>
                                <option value="2">Feb</option>
                                <option value="3">Mar</option>
                                <option value="4">Apr</option>
                                <option value="5">May</option>
                                <option value="6">Jun</option>
                                <option value="7">Jul</option>
                                <option value="8">Aug</option>
                                <option value="9">Sep</option>
                                <option value="10">Oct</option>
                                <option value="11">Nov</option>
                                <option value="12">Dec</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="field is-horizontal">
                <div class="field-label is-small"><label class="label">Day</label></div>
                <div class="field-body">
                    <div class="field is-grouped is-align-items-center">
                        <div class="control">
                            <input class="input is-small sched-dom-yearly" type="number" min="1" max="31" value="1" style="width:70px;">
                        </div>
                        <div class="control"><span class="is-size-7">of month</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Start / Stop date-time fields -->
    <div class="columns is-mobile mt-2" style="padding:0 8px;">
        <div class="column is-half">
            <div class="field">
                <label class="label is-small">Start date</label>
                <input class="input is-small sched-start" type="datetime-local">
            </div>
        </div>
        <div class="column is-half">
            <div class="field">
                <label class="label is-small">Stop date</label>
                <input class="input is-small sched-stop" type="datetime-local">
            </div>
        </div>
    </div>


    <!-- Header: last run info + 24h/12h toggle + Apply -->
    <div class="level mb-2" style="padding:4px 8px;">
        <div class="level-left">
            <div class="buttons has-addons mb-0">
                <button type="button" class="button is-small sched-btn-24h">24h</button>
                <button type="button" class="button is-small sched-btn-12h">AM/PM</button>
            </div>
        </div>
        <div class="level-right">
            <button type="button" class="button is-small is-info sched-apply">Apply</button>
            <span class="sched-last-run tag is-light is-small"></span>
        </div>
    </div>
</template>
