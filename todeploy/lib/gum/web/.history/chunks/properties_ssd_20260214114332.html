<!-- SEVEN DIGITS DISPLAY CELLS -->
<div id="properties-ssd" style="display:none;">
    <form onsubmit="return false;">
        <div class="container">

            <div class="box" id="grid-fields">
                <div class="columns">
                    <div class="column">
                        <div class="field">
                            <label class="label">Gadget title (optional)</label>
                            <div class="control">
                                <input class="input" name="card_title" type="text" placeholder="Can be empty, plain text or HTML" onchange="dlgSSD.geh.changed(this)">
                            </div>
                        </div>
                    </div>
                    <div class="column is-one-third">
                        <label class="label">Title location</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="north" onchange="dlgSSD.geh.changed(this)" checked>
                                North
                              </label>
                              <label class="radio">
                                <input type="radio" name="card_title_location" value="center" onchange="dlgSSD.geh.changed(this)">
                                Center
                              </label>
                              <label class="radio">
                                <input type="radio" name="card_title_location" value="south" onchange="dlgSSD.geh.changed(this)">
                                South
                              </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="columns">
                <div class="column">
                    <div class="field">
                        <label class="label">Target ExEn</label>
                        <div class="control is-expanded">
                            <div class="select is-fullwidth">
                                <select name="exen" onchange="dlgSSD.geh.changed(this)">
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="column">
                    <div class="field">
                        <label class="label">Device (number, list or pair)</label>
                        <div class="control is-expanded">
                            <div class="select is-fullwidth">
                                <select name="device" onchange="dlgSSD.geh.changed(this)">
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="column is-2">
                    <div class="field">
                        <label class="label">Key / Index</label>
                        <div class="control">
                            <input class="input" type="text" name="accessor"
                                   placeholder="" disabled
                                   onchange="dlgSSD.geh.changed(this)">
                        </div>
                    </div>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <div class="control">
                        <label class="label">Color schema</label>
                        <label class="radio">
                            <input type="radio" name="color" value="lcd" onchange="dlgSSD.geh.changed(this)">
                            LCD
                        </label>
                        <label class="radio">
                            <input type="radio" name="color" value="red" onchange="dlgSSD.geh.changed(this)">
                            Red
                        </label>
                        <label class="radio">
                            <input type="radio" name="color" value="green" onchange="dlgSSD.geh.changed(this)">
                            Green
                        </label>
                        <label class="radio">
                            <input type="radio" name="color" value="orange" onchange="dlgSSD.geh.changed(this)">
                            Orange
                        </label>
                    </div>
                </div>
                <div class="column">
                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Integer digits</label>
                                <div class="control">
                                    <input class="input" type="number" name="integers" min="1" max="12" onchange="dlgSSD.geh.changed(this)">
                                </div>
                                <p class="help">Negatives need one extra digit</p>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Decimal digits</label>
                                <div class="control">
                                    <input class="input" type="number" name="decimals" min="0" max="6" onchange="dlgSSD.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
if( typeof dlgSSD === "undefined" )   // Seven Segments Display
{
var dlgSSD =
{
    geh : null,

    setup : function( gadget, fnOnChanged, fnOnEditEnd )
    {
        this.geh = new GadgetEditorHelperSingleExEn( "properties-ssd", gadget, fnOnChanged, fnOnEditEnd );

        let $acc = $('#properties-ssd [name="accessor"]');

        if( gadget._devValueType_ === "list" )
        {
            $acc.prop( 'disabled', false ).attr( 'placeholder', '1-based index' ).attr( 'type', 'number' ).attr( 'min', '1' );
        }
        else if( gadget._devValueType_ === "pair" )
        {
            $acc.prop( 'disabled', false ).attr( 'placeholder', 'Key name' ).attr( 'type', 'text' );
        }
        else
        {
            $acc.prop( 'disabled', true ).attr( 'placeholder', 'N/A' ).val( '' );
        }

        return this;
    },

    show()
    {
        this.geh.showDialog();
    }
};
}
</script>
