<!-- Gauge (numerical) -->

<div id="properties-gauge"  style="display:none;">
    <form onsubmit="return false;">
        <div class="container">

            <div class="box" id="grid-fields">
                <div class="columns">
                    <div class="column">
                        <div class="field">
                            <label class="label">Gadget title (optional)</label>
                            <div class="control">
                                <input class="input" name="card_title" type="text" placeholder="Can be empty, plain text or HTML" onchange="dlgGauge.geh.changed(this)">
                            </div>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title location</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="north" onchange="dlgGauge.geh.changed(this)" checked>
                                North
                              </label>
                              <label class="radio">
                                <input type="radio" name="card_title_location" value="center" onchange="dlgGauge.geh.changed(this)">
                                Middle
                              </label>
                              <label class="radio">
                                <input type="radio" name="card_title_location" value="south" onchange="dlgGauge.geh.changed(this)">
                                South
                              </label>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title alignment</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="left" onchange="dlgGauge.geh.changed(this)">
                                Left
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="center" onchange="dlgGauge.geh.changed(this)" checked>
                                Center
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="right" onchange="dlgGauge.geh.changed(this)">
                                Right
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="columns">
                <div class="column is-two-thirds">
                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Target ExEn</label>
                                <div class="control is-expanded">
                                    <div class="select is-fullwidth">
                                        <select name="exen" onchange="dlgGauge.geh.changed(this)">
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Device (number, list or pair)</label>
                                <div class="control is-expanded">
                                    <div class="select is-fullwidth">
                                        <select name="device" onchange="dlgGauge.geh.changed(this)">
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="column is-2">
                            <div class="field">
                                <label class="label">Key / Index</label>
                                <div class="control">
                                    <input class="input" type="text" name="accessor"
                                           placeholder="" disabled
                                           onchange="dlgGauge.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Min value</label>
                                <div class="control">
                                    <input class="input" type="number" name="min" onchange="dlgGauge.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Max value</label>
                                <div class="control">
                                    <input class="input" type="number" name="max" onchange="dlgGauge.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Angle</label>
                                <div class="control">
                                    <input class="input" type="number" name="angle" min="-33" max="33" value="0" onchange="dlgGauge.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Radius</label>
                                <div class="control">
                                    <input class="input" type="number" name="radius" min="50" max="100" value="95" onchange="dlgGauge.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Thickness</label>
                                <div class="control">
                                    <input class="input" type="number" name="thick" min="10" max="60" value="38" onchange="dlgGauge.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="columns">
                        <div class="column is-2">
                            <div class="field">
                                <label class="label">Ticks</label>
                                <div class="control">
                                    <label class="checkbox">
                                        <input type="checkbox" name="ticks" checked onchange="dlgGauge.geh.changed(this)">
                                        Show
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="column is-4">
                            <div class="field">
                                <label class="label">Ticks values</label>
                                <div class="control">
                                    <input class="input" type="text" name="ticks_pos" placeholder="Optional tick labels (comma separated)" onchange="dlgGauge.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Ticks color</label>
                                <div class="field has-addons mb-0">
                                    <p class="control">
                                        <button class="button" type="button" name="ticks_color_toggle" title="Toggle custom color" onclick="dlgGauge._toggleClr_('ticks_color')">
                                            <span class="icon"><i class="ti ti-palette"></i></span>
                                        </button>
                                    </p>
                                    <p class="control">
                                        <input class="input" name="ticks_color" type="color" value="#333333" disabled onchange="dlgGauge.geh.changed(this)">
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Needle color</label>
                                <div class="field has-addons mb-0">
                                    <p class="control">
                                        <button class="button" type="button" name="needle_color_toggle" title="Toggle custom color" onclick="dlgGauge._toggleClr_('needle_color')">
                                            <span class="icon"><i class="ti ti-palette"></i></span>
                                        </button>
                                    </p>
                                    <p class="control">
                                        <input class="input" name="needle_color" type="color" value="#000000" disabled onchange="dlgGauge.geh.changed(this)">
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="column">
                    <table>
                        <tr>
                            <td><b>Ranges of color:&nbsp;</b></td>
                            <td><div id="tbl-dlg-gauge-toolbar"></div></td>
                        </tr>
                    </table>
                    <table id="tbl-dlg-gauge" class="table is-bordered is-stripped">
                        <thead>
                            <tr style="background-color:#444444;">
                                <th style="color:#F9E79F;">Start value</th>
                                <th style="color:#F9E79F;">End value</th>
                                <th style="color:#F9E79F;">Arc color</th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
if( typeof dlgGauge === "undefined" )
{
var dlgGauge =
{
    geh : null,
    te  : null,

    setup : function( gadget, fnOnChanged, fnOnEditEnd )
    {
        this.geh = new GadgetEditorHelperSingleExEn( "properties-gauge", gadget, fnOnChanged, fnOnEditEnd );

        let $acc = $('#properties-gauge [name="accessor"]');

        if( gadget._devValueType_ === "list" )
        {
            $acc.prop( 'disabled', false ).attr( 'placeholder', '1-based index' ).attr( 'type', 'number' ).attr( 'min', '1' );
        }
        else if( gadget._devValueType_ === "pair" )
        {
            $acc.prop( 'disabled', false ).attr( 'placeholder', 'Key name' ).attr( 'type', 'text' );
        }
        else if( gadget._devValueType_ === "scalar" )
        {
            $acc.prop( 'disabled', true ).attr( 'placeholder', 'N/A' ).val( '' );
        }
        else    // null — value type not yet detected
        {
            $acc.prop( 'disabled', false ).attr( 'placeholder', 'Key or index' ).attr( 'type', 'text' );
        }

        if( this.te === null )
        {
            this.te = new TableEditor( {
                                        table         : "tbl-dlg-gauge",
                                        toolbar       : "tbl-dlg-gauge-toolbar",
                                        onCellPostEdit: function( table, nRowIndex, sColName, value, isChanged )
                                                        {
                                                            if( value && isChanged )     // value can be null
                                                            {
                                                                let gadget = dlgGauge.geh.gadget;

                                                                if( nRowIndex >= gadget.zones.length)
                                                                    gadget.zones.push( { start: 0, end: 0, color: '#000000' } );

                                                                switch( sColName )
                                                                {
                                                                    case "start": gadget.zones[nRowIndex].start = Math.max( value, gadget.min ); break;
                                                                    case "end"  : gadget.zones[nRowIndex].end   = Math.min( value, gadget.max ); break;
                                                                    case "color": gadget.zones[nRowIndex].color = (p_base.isEmpty( value ) ? "#00AA00" : value); break;
                                                                }

                                                                dlgGauge.geh.fnOnChanged();
                                                            }

                                                            return value;
                                                        },
                                        onRowAppended : function( table, nRow )
                                                        {
                                                            let gadget = dlgGauge.geh.gadget;
                                                            let oRow   = { "start" : gadget.min, "end" : gadget.max, "color" : "#00AA00" };

                                                            for( const key in oRow )
                                                                table.setValue( nRow, key, oRow[key] );

                                                            dlgGauge.geh.gadget.zones.push( oRow );
                                                            dlgGauge.geh.fnOnChanged();
                                                        },
                                        onDeleteRow   : function( table, nRow )
                                                        {
                                                            dlgGauge.geh.gadget.zones.splice( nRow, 1 );
                                                            dlgGauge.geh.fnOnChanged();
                                                        },
                                        onRowCloned   : function( table, nRow )
                                                        {
                                                            dlgGauge.geh.gadget.zones.push( table.getRowData( nRow ) );
                                                            dlgGauge.geh.fnOnChanged();
                                                        },
                                        onRowMoved    : function( table, nFrom, nTo )
                                                        {
                                                            let arr = dlgGauge.geh.gadget.zones;
                                                            arr.splice( nTo, 0, arr.splice( nFrom, 1 )[0] );
                                                            dlgGauge.geh.fnOnChanged();
                                                        },
                                        columns       : [
                                                          { name: "start", minwidth: 4, maxwidth:  9, editor: '<input type="number">' },
                                                          { name: "end"  , minwidth: 4, maxwidth:  9, editor: '<input type="number">' },
                                                          { name: "color", minwidth: 9, maxwidth: 12, editor: '<input type="color">'  }
                                                        ]
                                       } );
        }

        this.te.setData( this.geh.gadget.zones );

        this._setClrEnabled_( 'ticks_color',  ! p_base.isEmpty( gadget.ticks_color  ) );
        this._setClrEnabled_( 'needle_color', ! p_base.isEmpty( gadget.needle_color ) );

        return this;
    },

    show()
    {
        this.geh.showDialog();

        return this;
    },

    /**
     * Toggles a color field between enabled (custom color) and disabled (null).
     *
     * @param {string} sName The `name` attribute of the color input (e.g. "ticks_color").
     */
    _toggleClr_ : function( sName )
    {
        let $input    = $( '#properties-gauge [name="' + sName + '"]' );
        let isEnabled = ! $input.prop( 'disabled' );

        this._setClrEnabled_( sName, ! isEnabled );

        this.geh.gadget[sName] = isEnabled ? null : $input.val();
        this.geh.fnOnChanged();
    },

    /**
     * Sets a color field enabled/disabled and updates its toggle button appearance.
     *
     * @param {string}  sName    The `name` attribute of the color input.
     * @param {boolean} bEnabled Whether the color input should be enabled.
     */
    _setClrEnabled_ : function( sName, bEnabled )
    {
        let $input  = $( '#properties-gauge [name="' + sName + '"]' );
        let $button = $( '#properties-gauge [name="' + sName + '_toggle"]' );

        $input.prop( 'disabled', ! bEnabled );

        if( bEnabled )  $button.addClass(    'is-primary' );
        else            $button.removeClass( 'is-primary' );
    }
};
}
</script>
