<div id="properties-check" style="display:none;">
    <form onsubmit="return false;">
        <div class="container">

            <div class="box" id="grid-fields">
                <div class="columns">
                    <div class="column">
                        <div class="field">
                            <label class="label">Gadget title (optional)</label>
                            <div class="control">
                                <input class="input" name="card_title" type="text" placeholder="Can be empty, plain text or HTML" onchange="dlgCheck.geh.changed(this)">
                            </div>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title location</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="north" onchange="dlgCheck.geh.changed(this)" checked>
                                North
                              </label>
                              <label class="radio">
                                <input type="radio" name="card_title_location" value="center" onchange="dlgCheck.geh.changed(this)">
                                Middle
                              </label>
                              <label class="radio">
                                <input type="radio" name="card_title_location" value="south" onchange="dlgCheck.geh.changed(this)">
                                South
                              </label>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title alignment</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="left" onchange="dlgCheck.geh.changed(this)">
                                Left
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="center" onchange="dlgCheck.geh.changed(this)" checked>
                                Center
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="right" onchange="dlgCheck.geh.changed(this)">
                                Right
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="columns">
                <div class="column">
                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Target ExEn</label>
                                <div class="control is-expanded">
                                    <div class="select is-fullwidth">
                                        <select name="exen" onchange="dlgCheck.geh.changed(this)">
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Device (type Boolean)</label>
                                <div class="control is-expanded">
                                    <div class="select is-fullwidth">
                                        <select name="device" onchange="dlgCheck.geh.changed(this)">
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="column is-2">
                            <div class="field">
                                <label class="label">Key / Index</label>
                                <div class="control">
                                    <input class="input" type="text" name="accessor"
                                           placeholder="" disabled
                                           onchange="dlgCheck.geh.changed(this)">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Icon when OFF</label>
                                <div class="field has-addons">
                                    <p class="control is-expanded">
                                        <input class="input" name="icon_off" type="text" title="Choose an image (optional)" placeholder="Choose one or leave empty" onchange="dlgCheck.geh.changed(this)">
                                    </p>
                                    <p class="control" title="Select an image" style="cursor:pointer;" onclick="gt.selectImg4Text($('#properties-check').find('[name=\'icon_off\']'))">
                                        <a class="button is-static"><i class="ti ti-folder-open"></i></a>
                                    </p>
                                    <p class="control" title="Upload an image" style="cursor:pointer;" onclick="gt.uploadImage()">
                                        <a class="button is-static"><i class="ti ti-cloud-upload"></i></a>
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Icon when ON</label>
                                <div class="field has-addons">
                                    <p class="control is-expanded">
                                        <input class="input" name="icon_on" type="text" title="Choose an image (optional)" placeholder="Choose one or leave empty" onchange="dlgCheck.geh.changed(this)">
                                    </p>
                                    <p class="control" title="Select an image" style="cursor:pointer;" onclick="gt.selectImg4Text($('#properties-check').find('[name=\'icon_on\']'))">
                                        <a class="button is-static"><i class="ti ti-folder-open"></i></a>
                                    </p>
                                    <p class="control" title="Upload an image" style="cursor:pointer;" onclick="gt.uploadImage()">
                                        <a class="button is-static"><i class="ti ti-cloud-upload"></i></a>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label class="checkbox">
                            <input type="checkbox" name="actuable" checked onchange="dlgCheck.geh.changed(this)">        <!-- Not needed to call .update() (when dialog is closed all values are updated) -->
                                Actuable: toggles the associated device state when user clicks the image
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script>

if( typeof dlgCheck === "undefined" )
{
var dlgCheck =
{
    geh : null,

    setup : function( gadget, fnOnChanged, fnOnEditEnd )
    {
        this.geh = new GadgetEditorHelperSingleExEn( "properties-check", gadget, fnOnChanged, fnOnEditEnd );

        let $acc = $('#properties-check [name="accessor"]');

        if( gadget._devValueType_ === "list" )
        {
            $acc.prop( 'disabled', false ).attr( 'placeholder', '1-based index' ).attr( 'type', 'number' ).attr( 'min', '1' );
        }
        else if( gadget._devValueType_ === "pair" )
        {
            $acc.prop( 'disabled', false ).attr( 'placeholder', 'Key name' ).attr( 'type', 'text' );
        }
        else if( gadget._devValueType_ === "scalar" )
        {
            $acc.prop( 'disabled', true ).attr( 'placeholder', 'N/A' ).val( '' );
        }
        else    // null — value type not yet detected
        {
            $acc.prop( 'disabled', false ).attr( 'placeholder', 'Key or index' ).attr( 'type', 'text' );
        }

        return this;
    },

    show()
    {
        this.geh.showDialog();

        return this;
    },
};
}
</script>
