<!-- Scheduler (Kronos cron device) -->

<div id="properties-scheduler" style="display:none;">
    <form onsubmit="return false;">
        <div class="container">

            <div class="box" id="grid-fields">
                <div class="columns">
                    <div class="column">
                        <div class="field">
                            <label class="label">Gadget title (optional)</label>
                            <div class="control">
                                <input class="input" name="card_title" type="text" placeholder="Can be empty, plain text or HTML" onchange="dlgScheduler.geh.changed(this)">
                            </div>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title location</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="north" onchange="dlgScheduler.geh.changed(this)" checked>
                                North
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="center" onchange="dlgScheduler.geh.changed(this)">
                                Middle
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_location" value="south" onchange="dlgScheduler.geh.changed(this)">
                                South
                            </label>
                        </div>
                    </div>
                    <div class="column is-narrow">
                        <label class="label">Title alignment</label>
                        <div class="field">
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="left" onchange="dlgScheduler.geh.changed(this)">
                                Left
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="center" onchange="dlgScheduler.geh.changed(this)" checked>
                                Center
                            </label>
                            <label class="radio">
                                <input type="radio" name="card_title_align" value="right" onchange="dlgScheduler.geh.changed(this)">
                                Right
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="columns">
                <div class="column">
                    <div class="field">
                        <label class="label">Target ExEn</label>
                        <div class="control is-expanded">
                            <div class="select is-fullwidth">
                                <select name="exen" onchange="dlgScheduler.geh.changed(this)">
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="column">
                    <div class="field">
                        <label class="label">Device (Kronos type)</label>
                        <div class="control is-expanded">
                            <div class="select is-fullwidth">
                                <select name="device" onchange="dlgScheduler.geh.changed(this)">
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="box">
                <p class="is-size-7 has-text-grey">
                    The schedule is configured directly in the gadget UI.
                    Use this dialog to select the ExEn and Kronos device, then close and configure the schedule inline.
                </p>
            </div>

        </div>
    </form>
</div>

<script>
if( typeof dlgScheduler === "undefined" )
{
var dlgScheduler =
{
    geh : null,

    setup : function( gadget, fnOnChanged, fnOnEditEnd )
    {
        this.geh = new GadgetEditorHelperSingleExEn( "properties-scheduler", gadget, fnOnChanged, fnOnEditEnd );

        return this;
    },

    show()
    {
        this.geh.showDialog();

        return this;
    }
};
}
</script>
