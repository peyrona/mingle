<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Gum ::: dashboard</title>

        <!-- JQuery ============================= -->
        <link   href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.css" rel="stylesheet">
        <script src ="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script src ="https://ajax.googleapis.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>

        <!-- Gum ================================ -->
        <link href="/gum/gum.css" rel="stylesheet">  <!-- Tabler icons and Bulma, are inside CSS -->
    </head>
    <body>
        <!-- Used only when in design mode (for Grid and for Free layouts) -->
        <div id="gum-toolbar" class="gum-toolbar is-pulled-right">
        </div>

        <!-- Used for the general Dashboard configuration (HTML name, Background, ExEns, etc) -->
        <div id="div-dlg_options" style="display:none;">
        </div>

        <!-- Used for the every Gadget Dashboard configuration (gadget's properties) -->
        <div id="div-dlg_properties">
        </div>

        <!-- Container for gadget HTML templates (loaded at startup, <template> elements are inert) -->
        <div id="div-gadget-templates" style="display:none;">
        </div>

        <!-- NOTE: Gadget scripts are loaded dynamically by gum.js from gadgets/gadgets.json -->
        <!-- Do NOT add static <script> tags for gadgets here - they will cause duplicate loading -->
        <script src="/gum/js/p_polyfill.js"   ></script>    <!-- ¡ Do not change the order ! -->
        <script src="/gum/js/p_base.js"       ></script>
        <script src="/gum/js/p_app.js"        ></script>
        <script src="/gum/js/p_ws-wrap.js"    ></script>
        <script src="/gum/js/p_tableditor.js" ></script>
        <script src="/gum/js/gum_ws_boards.js"></script>    <!-- From here down, all were created just for Gum -->
        <script src="/gum/js/gum_tools.js"    ></script>
        <script src="/gum/js/free.js"         ></script>
        <script src="/gum/js/grid.js"         ></script>
        <script src="/gum/js/gum.js"          ></script>
        <script>
            $(document).ready( () => gum.run( getConfig() ) );    // Do not move this block

            // START MARK TO INSERT getConfig()
            function getConfig()
            {
                return {"background":{"image":{"url":"","mode":"cover"},"color":{"from":"#245d70","to":"#7dc4d9","degrees":0}},"password":"","exens":[{"host":"192.168.7.9","port":55880,"ssl":false}],"layout":{"type":"grid","contents":null}};
            }
           // END MARK TO INSERT getConfig()
        </script>
    </body>
</html>
